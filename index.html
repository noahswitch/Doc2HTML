<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc2HTML — Live Document to HTML Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Editor & Preview Styles */
        .rich-editor {
            min-height: 100%;
            outline: none;
            line-height: 1.6;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .rich-editor:empty:before {
            content: attr(placeholder);
            color: #9ca3af;
            pointer-events: none;
            display: block;
        }
        /* Ensure pasted tables look clean */
        .rich-editor table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        .rich-editor th, .rich-editor td {
            border: 1px solid #d1d5db;
            padding: 0.5rem 0.75rem;
        }
        .rich-editor th {
            background-color: #f3f4f6;
            font-weight: 600;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
            font-weight: 600;
        }
        
        /* Preview Iframe Reset */
        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg">
                <i class="fa-solid fa-file-code text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-900">Doc2HTML</h1>
                <p class="text-xs text-gray-500">Live Visual Document to Clean HTML</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="clearAll()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition">
                <i class="fa-solid fa-trash-can mr-2"></i>Clear
            </button>
            <button onclick="copyHTML()" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition">
                <i class="fa-regular fa-copy mr-2"></i>Copy HTML
            </button>
            <button onclick="downloadHTML()" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition shadow-sm">
                <i class="fa-solid fa-download mr-2"></i>Export .html
            </button>
        </div>
    </header>

    <!-- Main Two-Panel Layout -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- LEFT PANEL: Document Editor -->
        <section class="w-full md:w-1/2 flex flex-col border-r border-gray-200 bg-white">
            <!-- Toolbar -->
            <div class="px-4 py-2 border-b border-gray-200 bg-gray-50 flex flex-wrap gap-1 items-center">
                <button onclick="formatDoc('bold')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Bold"><i class="fa-solid fa-bold"></i></button>
                <button onclick="formatDoc('italic')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Italic"><i class="fa-solid fa-italic"></i></button>
                <button onclick="formatDoc('underline')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Underline"><i class="fa-solid fa-underline"></i></button>
                <div class="w-px h-6 bg-gray-300 mx-1"></div>
                <button onclick="formatDoc('formatBlock', 'H1')" class="p-2 text-gray-600 hover:bg-gray-200 rounded font-bold" title="Heading 1">H1</button>
                <button onclick="formatDoc('formatBlock', 'H2')" class="p-2 text-gray-600 hover:bg-gray-200 rounded font-semibold" title="Heading 2">H2</button>
                <button onclick="formatDoc('formatBlock', 'P')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Paragraph">P</button>
                <div class="w-px h-6 bg-gray-300 mx-1"></div>
                <button onclick="formatDoc('insertUnorderedList')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Bullet List"><i class="fa-solid fa-list-ul"></i></button>
                <button onclick="formatDoc('insertOrderedList')" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Numbered List"><i class="fa-solid fa-list-ol"></i></button>
                <div class="w-px h-6 bg-gray-300 mx-1"></div>
                <button onclick="insertTable()" class="p-2 text-gray-600 hover:bg-gray-200 rounded" title="Insert Table"><i class="fa-solid fa-table"></i></button>
                <button onclick="formatDoc('removeFormat')" class="p-2 text-red-500 hover:bg-red-50 rounded ml-auto" title="Clear Formatting"><i class="fa-solid fa-eraser"></i></button>
            </div>
            
            <!-- Editor Area -->
            <div class="flex-1 p-6 overflow-y-auto">
                <div id="docEditor" 
                     contenteditable="true" 
                     class="rich-editor w-full h-full text-gray-800"
                     placeholder="Type here, or paste directly from Microsoft Word, Excel, or Google Docs...&#10;&#10;Tables, formatting, and lists are preserved automatically.">
                </div>
            </div>
        </section>

        <!-- RIGHT PANEL: HTML Code & Live Preview -->
        <section class="w-full md:w-1/2 flex flex-col bg-gray-50">
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 bg-white px-4">
                <button onclick="switchTab('code')" id="tab-code" class="tab-active px-4 py-3 text-sm font-medium text-gray-600 hover:text-blue-600 transition flex items-center gap-2">
                    <i class="fa-solid fa-code"></i> HTML Code
                </button>
                <button onclick="switchTab('preview')" id="tab-preview" class="px-4 py-3 text-sm font-medium text-gray-600 hover:text-blue-600 transition flex items-center gap-2">
                    <i class="fa-solid fa-eye"></i> Live Preview
                </button>
            </div>

            <!-- Tab Contents -->
            <div class="flex-1 relative overflow-hidden">
                <!-- Code View -->
                <div id="view-code" class="absolute inset-0 flex flex-col">
                    <textarea id="htmlOutput" class="flex-1 w-full p-4 font-mono text-sm bg-gray-900 text-green-400 resize-none focus:outline-none" spellcheck="false" placeholder="<!-- Live HTML output will appear here as you type... -->"></textarea>
                    <div class="px-4 py-2 bg-gray-800 text-gray-400 text-xs flex justify-between border-t border-gray-700">
                        <span id="charCount">0 characters</span>
                        <span>Auto-updating</span>
                    </div>
                </div>

                <!-- Preview View -->
                <div id="view-preview" class="absolute inset-0 hidden">
                    <iframe id="previewFrame" class="preview-iframe"></iframe>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer / Settings Bar -->
    <footer class="bg-white border-t border-gray-200 px-6 py-3 z-10">
        <div class="flex flex-wrap items-center justify-between gap-4 text-sm">
            <div class="flex items-center gap-2 text-gray-600 font-medium">
                <i class="fa-brands fa-github"></i> Doc2HTML · Open Source
            </div>
            
            <div class="flex flex-wrap items-center gap-4 text-gray-700">
                <div class="flex items-center gap-2">
                    <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">Output Style:</span>
                    <select id="outputStyle" onchange="updateLivePreview()" class="bg-gray-50 border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="semantic">Semantic HTML5 + Tailwind</option>
                        <option value="plain">Plain HTML</option>
                    </select>
                </div>

                <div class="flex items-center gap-2">
                    <span class="text-gray-500 text-xs uppercase tracking-wider font-semibold">Indent:</span>
                    <select id="indentStyle" onchange="updateLivePreview()" class="bg-gray-50 border border-gray-300 rounded px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="2">2 spaces</option>
                        <option value="4">4 spaces</option>
                        <option value="tab">Tab</option>
                    </select>
                </div>

                <div class="flex items-center gap-3 ml-2">
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="checkbox" id="includeDoctype" checked onchange="updateLivePreview()" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-xs">DOCTYPE</span>
                    </label>
                    <label class="flex items-center gap-1 cursor-pointer">
                        <input type="checkbox" id="includeMeta" checked onchange="updateLivePreview()" class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-xs">Meta Viewport</span>
                    </label>
                </div>
            </div>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const docEditor = document.getElementById('docEditor');
        const htmlOutput = document.getElementById('htmlOutput');
        const previewFrame = document.getElementById('previewFrame');
        const charCount = document.getElementById('charCount');

        // 1. Rich Text Formatting Commands
        function formatDoc(cmd, value = null) {
            if (value) {
                document.execCommand(cmd, false, value);
            } else {
                document.execCommand(cmd);
            }
            docEditor.focus();
            updateLivePreview();
        }

        // 2. Insert a basic table
        function insertTable() {
            const tableHTML = `
                <table style="width:100%; border-collapse: collapse; margin: 1rem 0;">
                    <thead>
                        <tr>
                            <th style="border: 1px solid #d1d5db; padding: 8px; background: #f3f4f6;">Header 1</th>
                            <th style="border: 1px solid #d1d5db; padding: 8px; background: #f3f4f6;">Header 2</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="border: 1px solid #d1d5db; padding: 8px;">Row 1, Cell 1</td>
                            <td style="border: 1px solid #d1d5db; padding: 8px;">Row 1, Cell 2</td>
                        </tr>
                        <tr>
                            <td style="border: 1px solid #d1d5db; padding: 8px;">Row 2, Cell 1</td>
                            <td style="border: 1px solid #d1d5db; padding: 8px;">Row 2, Cell 2</td>
                        </tr>
                    </tbody>
                </table><p><br></p>
            `;
            document.execCommand('insertHTML', false, tableHTML);
            updateLivePreview();
        }

        // 3. Live Preview Updater (Debounced for performance)
        let timeout;
        docEditor.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updateLivePreview, 300); // 300ms debounce
        });

        // Also update if user pastes
        docEditor.addEventListener('paste', () => {
            setTimeout(updateLivePreview, 100);
        });

        function updateLivePreview() {
            let content = docEditor.innerHTML;
            
            // Clean up empty placeholder paragraphs
            if (content === '<p><br></p>' || content === '<br>') {
                content = '';
            }

            const style = document.getElementById('outputStyle').value;
            const indent = document.getElementById('indentStyle').value === 'tab' ? '\t' : ' '.repeat(parseInt(document.getElementById('indentStyle').value));
            const includeDoctype = document.getElementById('includeDoctype').checked;
            const includeMeta = document.getElementById('includeMeta').checked;

            let finalHTML = '';

            if (includeDoctype) {
                finalHTML += '<!DOCTYPE html>\n';
            }
            finalHTML += '<html lang="en">\n<head>\n';
            if (includeMeta) {
                finalHTML += `${indent}<meta charset="UTF-8">\n`;
                finalHTML += `${indent}<meta name="viewport" content="width=device-width, initial-scale=1.0">\n`;
            }
            finalHTML += `${indent}<title>Converted Document</title>\n`;
            
            if (style === 'semantic') {
                finalHTML += `${indent}<script src="https://cdn.tailwindcss.com"><\/script>\n`;
            }
            
            finalHTML += `</head>\n<body class="${style === 'semantic' ? 'font-sans p-8 max-w-4xl mx-auto' : ''}">\n`;
            
            // Simple indentation for body content
            const indentedContent = content.split('\n').map(line => line ? indent + line : '').join('\n');
            finalHTML += `${indent}${indentedContent}\n`;
            
            finalHTML += `</body>\n</html>`;

            // Update Code View
            htmlOutput.value = finalHTML;
            charCount.textContent = `${finalHTML.length} characters`;

            // Update Preview Iframe
            const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(finalHTML);
            iframeDoc.close();
        }

        // 4. Tab Switching
        function switchTab(tabName) {
            document.getElementById('view-code').classList.add('hidden');
            document.getElementById('view-preview').classList.add('hidden');
            document.getElementById('tab-code').classList.remove('tab-active');
            document.getElementById('tab-preview').classList.remove('tab-active');
            
            document.getElementById('view-' + tabName).classList.remove('hidden');
            document.getElementById('tab-' + tabName).classList.add('tab-active');
        }

        // 5. Utility Functions
        function clearAll() {
            if(confirm('Are you sure you want to clear the editor?')) {
                docEditor.innerHTML = '';
                updateLivePreview();
                docEditor.focus();
            }
        }

        function copyHTML() {
            htmlOutput.select();
            document.execCommand('copy');
            
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Copied!';
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);
        }

        function downloadHTML() {
            const blob = new Blob([htmlOutput.value], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize empty state
        updateLivePreview();
    </script>
</body>
</html>
